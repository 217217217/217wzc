<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王钟程的快乐乐园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            /* 动漫全屏背景 */
            background: url('https://p3-flow-image-sign.doubao.com/obj/doubao-chat-image/30a01443909a404892221024f300390c') no-repeat center fixed;
            background-size: cover;
        }
        .dark-overlay {
            width: 100%;
            min-height: 100vh;
            background: rgba(0,0,0,0.42);
            padding: 40px 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* 顶部发光标题 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-size: 48px;
            color: #ffffff;
            text-shadow: 0 0 10px #ffdd00, 0 0 25px #ff7722;
            animation: flash 2s infinite alternate;
        }
        @keyframes flash {
            from {transform: scale(1)}
            to {transform: scale(1.03)}
        }
        .page-header p {
            color: #fff;
            font-size: 19px;
            margin-top: 12px;
        }
        /* 功能卡片网格布局 */
        .func-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 26px;
        }
        .card {
            background: rgba(255,255,255,0.94);
            border-radius: 18px;
            padding: 26px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.25);
        }
        .card h2 {
            font-size: 23px;
            color: #1a47b8;
            margin-bottom: 18px;
            border-left: 6px solid #ff5588;
            padding-left: 12px;
        }
        /* 按钮通用样式 */
        button {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 7px 5px;
            transition: all 0.25s ease;
        }
        button:hover {
            transform: translateY(-4px);
            filter: brightness(1.1);
        }
        .btn-blue {background: #3b88f0; color:#fff;}
        .btn-red {background: #f54c68; color:#fff;}
        .btn-green {background: #24bd70; color:#fff;}
        .btn-orange {background: #ff9f26; color:#fff;}
        .btn-purple {background: #9254e8; color:#fff;}
        .btn-cyan {background: #02b4bc; color:#fff;}
        /* 输入框、结果展示 */
        input, textarea {
            width: 100%;
            padding: 13px;
            border: 1px solid #d2d8e3;
            border-radius: 10px;
            margin: 12px 0;
            font-size: 15px;
        }
        .result-area {
            background: #f3f8ff;
            padding: 14px;
            border-radius: 10px;
            min-height: 70px;
            margin-top: 14px;
            white-space: pre-line;
        }
        /* 弹窗遮罩 */
        .global-popup {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .popup-content {
            background: #fff;
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 92%;
        }
        .popup-big-text {
            font-size: 120px;
            font-weight: 900;
            color: #ff2222;
        }
        /* 留言列表 */
        .msg-wrapper {
            max-height: 220px;
            overflow-y: auto;
            margin-top: 16px;
        }
        .msg-item {
            background: #ffeef6;
            padding: 11px;
            border-radius: 9px;
            margin: 9px 0;
        }
        /* 彩蛋漂浮文字 */
        .float-text {
            position: fixed;
            pointer-events: none;
            font-size: 26px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 6px black;
            z-index: 999;
        }
    </style>
</head>
<body onclick="createClickText(event)">
    <div class="dark-overlay">
        <div class="container">
            <div class="page-header">
                <h1>✨ 王钟程专属快乐乐园 ✨</h1>
                <p>超多趣味小游戏、专属夸奖、每日打卡，全部送给最棒的王钟程！</p>
            </div>

            <div class="func-grid">
                <!-- 1.夸夸生成器 -->
                <div class="card">
                    <h2>🌟 王钟程专属夸夸机</h2>
                    <p>随机生成各种赞美王钟程的暖心文案</p>
                    <button class="btn-blue" onclick="randomPraise()">一键生成夸奖</button>
                    <div class="result-area" id="praiseBox"></div>
                </div>
